{% extends "base.html" %}

{% block title %}Forgot Password - Make-Up Class System{% endblock %}

{% block auth_content %}
<div class="auth-container auth-single">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-key"></i>
            </div>
            <h1>Forgot Password?</h1>
            <p>Enter your email address and we'll send you a reset link</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i>
                    Email Address
                </label>
                <input type="email" id="email" name="email" placeholder="Enter your registered email" required autofocus>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-paper-plane"></i>
                Send Reset Link
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
