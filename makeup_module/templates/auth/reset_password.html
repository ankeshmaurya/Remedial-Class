{% extends "base.html" %}

{% block title %}Reset Password - Make-Up Class System{% endblock %}

{% block auth_content %}
<div class="auth-container auth-single">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-lock-open"></i>
            </div>
            <h1>Reset Password</h1>
            <p>Create a new password for your account</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    New Password
                </label>
                <div class="password-input">
                    <input type="password" id="password" name="password" placeholder="Enter new password" required minlength="8">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <small class="form-hint">Minimum 8 characters</small>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-lock"></i>
                    Confirm New Password
                </label>
                <div class="password-input">
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-check"></i>
                Reset Password
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const icon = event.currentTarget.querySelector('i');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
